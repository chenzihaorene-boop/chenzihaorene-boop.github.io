<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEN Zihao — Ingénieur Industrie 4.0</title>
<meta name="description" content="CHEN Zihao — Ingénieur Arts et Métiers chez Saint-Gobain TIP Isover : digitalisation du savoir-faire process, automatisation, data et formation des opérateurs. Candidat Ingénieur Industrie 4.0.">
<meta property="og:title" content="CHEN Zihao — Ingénieur Industrie 4.0">
<meta property="og:description" content="Le digital au cœur des opérations, au service de la performance. Candidat Ingénieur Industrie 4.0 — Isover Orange.">
<meta property="og:type" content="website">

<meta property="og:image:height" content="630">

<meta name="twitter:title" content="CHEN Zihao — Ingénieur Industrie 4.0">
<meta name="twitter:description" content="Le digital au cœur des opérations, au service de la performance.">
<meta name="twitter:image" content="https://chenzihaorene-boop.github.io/assets/og-image.png">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f4ef;
    --surface:#ffffff;
    --ink:#1a1714;
    --muted:#6f6860;
    --line:#e7e0d6;
    --accent:#9e2b25;       /* Arts et Métiers burgundy — identity */
    --accent-soft:#f6e9e7;
    --accent-deep:#6f1d19;
    --molten:#e8743b;       /* furnace amber — theme */
    --molten-2:#f5a623;     /* glowing gold-amber */
    --gold:#b08d3e;
    --dark:#15100d;         /* deep warm black */
    --dark-2:#1f1813;
    --radius:18px;
    --radius-lg:24px;
    --shadow:0 2px 6px rgba(26,23,20,.05),0 18px 40px -18px rgba(26,23,20,.14);
    --shadow-lg:0 8px 18px rgba(26,23,20,.07),0 40px 80px -30px rgba(26,23,20,.28);
    --font-display:"Fraunces","Noto Sans SC",serif;
    --font-body:"Inter","Noto Sans SC",system-ui,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,monospace;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--molten);color:#fff}
  a{color:inherit}
  section{scroll-margin-top:80px}

  /* ---------- scroll progress ---------- */
  .progress{
    position:fixed;top:0;left:0;height:3px;width:0;z-index:200;
    background:linear-gradient(90deg,var(--accent),var(--molten),var(--molten-2));
    box-shadow:0 0 12px rgba(232,116,59,.6);
  }

  /* ---------- nav ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    transition:background .35s var(--ease),border-color .35s var(--ease),backdrop-filter .35s;
    border-bottom:1px solid transparent;
  }
  .nav-inner{
    max-width:1140px;margin:0 auto;padding:16px 28px;
    display:flex;align-items:center;gap:24px;
  }
  .brand{
    font-family:var(--font-display);font-weight:700;font-size:1.08rem;
    text-decoration:none;letter-spacing:.01em;white-space:nowrap;
    color:#fff;transition:color .35s var(--ease);
  }
  .brand em{color:var(--molten-2);font-style:normal}
  .nav-links{display:flex;gap:2px;margin-left:auto}
  .nav-links a{
    text-decoration:none;color:rgba(255,255,255,.72);font-size:.86rem;font-weight:500;
    padding:7px 13px;border-radius:99px;transition:color .25s,background .25s;
  }
  .nav-links a:hover{color:#fff;background:rgba(255,255,255,.12)}
  .lang{display:flex;gap:2px;border:1px solid rgba(255,255,255,.22);border-radius:99px;padding:3px;background:rgba(255,255,255,.08);transition:all .35s var(--ease)}
  .lang button{
    border:0;background:transparent;cursor:pointer;font-family:var(--font-mono);
    font-size:.74rem;font-weight:500;color:rgba(255,255,255,.7);
    padding:4px 10px;border-radius:99px;transition:all .25s;
  }
  .lang button.active{background:#fff;color:var(--ink)}
  /* scrolled state → light bar */
  .nav.scrolled{
    background:rgba(247,244,239,.82);backdrop-filter:blur(16px) saturate(1.4);
    border-bottom-color:var(--line);
  }
  .nav.scrolled .brand{color:var(--ink)}
  .nav.scrolled .brand em{color:var(--accent)}
  .nav.scrolled .nav-links a{color:var(--muted)}
  .nav.scrolled .nav-links a:hover{color:var(--ink);background:var(--accent-soft)}
  .nav.scrolled .lang{border-color:var(--line);background:var(--surface)}
  .nav.scrolled .lang button{color:var(--muted)}
  .nav.scrolled .lang button.active{background:var(--ink);color:#fff}
  @media (max-width:760px){.nav-links{display:none}}

  /* ---------- layout ---------- */
  .wrap{max-width:1140px;margin:0 auto;padding:0 28px}
  .section{padding:110px 0}
  .kicker{
    display:inline-flex;align-items:center;gap:9px;
    font-family:var(--font-mono);
    font-size:.74rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:18px;
  }
  .kicker::before{content:"";width:28px;height:1px;background:var(--accent)}
  h2{
    font-family:var(--font-display);font-size:clamp(1.9rem,3.8vw,2.7rem);
    font-weight:600;margin-bottom:14px;letter-spacing:-.015em;line-height:1.1;
  }
  .sec-intro{color:var(--muted);max-width:560px;margin-bottom:48px;font-size:1.02rem}

  /* ---------- hero ---------- */
  .hero{
    position:relative;min-height:100svh;display:flex;flex-direction:column;
    justify-content:center;padding:130px 0 50px;overflow:hidden;
    background:var(--dark);color:#f3ece4;isolation:isolate;
  }
  /* molten mesh — animated furnace glow */
  .hero-mesh{position:absolute;inset:0;z-index:-3;pointer-events:none}
  .hero-mesh::before,.hero-mesh::after{
    content:"";position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;
    animation:drift 18s ease-in-out infinite alternate;
  }
  .hero-mesh::before{
    width:680px;height:680px;top:-180px;right:-120px;
    background:radial-gradient(circle,rgba(232,116,59,.55),rgba(232,116,59,0) 65%);
  }
  .hero-mesh::after{
    width:560px;height:560px;bottom:-220px;left:-140px;
    background:radial-gradient(circle,rgba(158,43,37,.5),rgba(158,43,37,0) 65%);
    animation-duration:22s;
  }
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-50px,40px) scale(1.12)}}
  /* digital-twin canvas */
  #net{position:absolute;inset:0;z-index:-2;width:100%;height:100%}
  /* cursor glow */
  .hero-glow{
    position:absolute;width:460px;height:460px;border-radius:50%;z-index:-1;pointer-events:none;
    background:radial-gradient(circle,rgba(245,166,35,.16),transparent 70%);
    transform:translate(-50%,-50%);left:50%;top:40%;transition:opacity .4s;opacity:0;
  }
  /* faint editorial watermark */
  .hero-mark{
    position:absolute;right:-2%;bottom:-6%;z-index:-1;pointer-events:none;
    font-family:var(--font-display);font-weight:900;font-size:34vw;line-height:.8;
    color:transparent;-webkit-text-stroke:1.5px rgba(245,166,35,.07);
    letter-spacing:-.04em;user-select:none;
  }
  .hero-grid{display:flex;align-items:center;gap:60px}
  .hero-main{flex:1;min-width:0}
  .hero-tag{
    display:inline-flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:99px;padding:8px 16px;
    font-family:var(--font-mono);font-size:.76rem;font-weight:500;letter-spacing:.04em;
    color:rgba(243,236,228,.85);margin-bottom:30px;backdrop-filter:blur(6px);
  }
  .hero-tag .dot{width:8px;height:8px;border-radius:50%;background:#46d27a;box-shadow:0 0 0 0 rgba(70,210,122,.5);animation:pulse 2.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(70,210,122,.5)}55%{box-shadow:0 0 0 8px rgba(70,210,122,0)}}
  h1{
    font-family:var(--font-display);
    font-size:clamp(2.6rem,6.6vw,4.6rem);
    line-height:1.04;font-weight:600;letter-spacing:-.025em;max-width:15ch;
    color:#fdf8f2;
  }
  h1 .accent{
    background:linear-gradient(100deg,var(--molten-2),var(--molten) 50%,var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background-size:200% auto;animation:shimmer 6s linear infinite;
  }
  @keyframes shimmer{to{background-position:200% center}}
  .hero-sub{max-width:600px;margin-top:26px;font-size:1.08rem;color:rgba(243,236,228,.72)}
  .hero-cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:38px}
  .btn{
    display:inline-flex;align-items:center;gap:9px;
    padding:14px 28px;border-radius:99px;text-decoration:none;
    font-size:.93rem;font-weight:600;transition:transform .25s var(--ease),box-shadow .25s,background .25s,border-color .25s;
  }
  .btn:hover{transform:translateY(-3px)}
  .btn-primary{
    background:linear-gradient(100deg,var(--molten),var(--accent));color:#fff;
    box-shadow:0 12px 30px -8px rgba(232,116,59,.6);
  }
  .btn-primary:hover{box-shadow:0 18px 42px -10px rgba(232,116,59,.75)}
  .btn-ghost{background:rgba(255,255,255,.07);color:#f3ece4;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(6px)}
  .btn-ghost:hover{background:rgba(255,255,255,.14)}
  /* avatar */
  .avatar{
    flex:0 0 auto;width:230px;height:230px;border-radius:50%;padding:5px;position:relative;
    background:conic-gradient(from 140deg,var(--molten-2),var(--accent),var(--molten),var(--molten-2));
    box-shadow:0 0 60px -10px rgba(232,116,59,.55);
    animation:spin 14s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .avatar .ph{
    width:100%;height:100%;border-radius:50%;overflow:hidden;
    background:var(--dark-2);display:grid;place-items:center;animation:spin 14s linear infinite reverse;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
  .avatar .mono{font-family:var(--font-display);font-size:3.8rem;font-weight:700;color:var(--molten-2)}
  .avatar.loaded img{display:block}
  .avatar.loaded .mono{display:none}
  @media (max-width:860px){
    .hero-grid{flex-direction:column-reverse;align-items:flex-start;gap:34px}
    .avatar{width:140px;height:140px}
    .avatar .mono{font-size:2.4rem}
    h1{max-width:none}
  }
  /* hero stats */
  .hero-stats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:70px;
    border-top:1px solid rgba(255,255,255,.14);
  }
  .stat{padding:26px 24px 0 0;border-right:1px solid rgba(255,255,255,.08)}
  .stat:last-child{border-right:0}
  .stat b{font-family:var(--font-display);font-size:2rem;font-weight:700;display:block;line-height:1.1;color:#fdf8f2}
  .stat b .u{color:var(--molten-2)}
  .stat small{color:rgba(243,236,228,.6);font-size:.82rem;display:block;margin-top:6px}
  @media (max-width:760px){
    .hero-stats{grid-template-columns:repeat(2,1fr);gap:0}
    .stat{border-right:0;padding:22px 16px 0 0}
    .stat:nth-child(odd){border-right:1px solid rgba(255,255,255,.08)}
  }
  .scroll-cue{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
    font-family:var(--font-mono);font-size:.66rem;letter-spacing:.25em;text-transform:uppercase;
    color:rgba(243,236,228,.4);display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .scroll-cue span{width:1px;height:34px;background:linear-gradient(rgba(245,166,35,.7),transparent);animation:cue 2s ease-in-out infinite}
  @keyframes cue{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}

  /* ---------- ticker ---------- */
  .ticker{
    background:var(--dark-2);color:rgba(243,236,228,.85);overflow:hidden;
    border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);
    padding:16px 0;white-space:nowrap;
  }
  .ticker-track{display:inline-flex;gap:0;animation:scroll-x 32s linear infinite;will-change:transform}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker-track span{
    font-family:var(--font-mono);font-size:.84rem;letter-spacing:.05em;
    padding:0 26px;display:inline-flex;align-items:center;gap:26px;
  }
  .ticker-track span::after{content:"◆";color:var(--molten);font-size:.6rem}
  @keyframes scroll-x{to{transform:translateX(-50%)}}

  /* ---------- about / axes ---------- */
  .about-lead{display:grid;grid-template-columns:1fr 1fr;gap:38px;max-width:880px;margin-bottom:60px}
  .about-lead p{color:var(--muted);font-size:1.04rem}
  .about-lead p strong{color:var(--ink);font-weight:600}
  @media (max-width:760px){.about-lead{grid-template-columns:1fr;gap:18px}}
  .axes{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media (max-width:760px){.axes{grid-template-columns:1fr}}
  .axis{
    position:relative;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-lg);padding:30px 30px 28px;overflow:hidden;
    transition:transform .35s var(--ease),box-shadow .35s var(--ease),border-color .35s;
  }
  .axis::before{
    content:"";position:absolute;top:0;left:0;height:3px;width:0;
    background:linear-gradient(90deg,var(--molten),var(--accent));transition:width .5s var(--ease);
  }
  .axis:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:transparent}
  .axis:hover::before{width:100%}
  .axis-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .axis-ico{
    width:52px;height:52px;border-radius:15px;display:grid;place-items:center;font-size:1.5rem;
    background:linear-gradient(140deg,var(--accent-soft),#fdf3ee);border:1px solid var(--line);
  }
  .axis-no{font-family:var(--font-mono);font-size:1.05rem;font-weight:700;color:var(--molten);opacity:.45}
  .axis b{display:block;font-family:var(--font-display);font-size:1.22rem;font-weight:600;margin-bottom:8px}
  .axis small{color:var(--muted);font-size:.93rem;line-height:1.6;display:block}

  /* ---------- experience ---------- */
  .exp.section{background:linear-gradient(var(--bg),#fbf9f5)}
  .timeline{position:relative;padding-left:38px;max-width:840px}
  .timeline::before{
    content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(var(--molten),var(--accent),var(--line));border-radius:2px;
  }
  .job{position:relative;margin-bottom:24px}
  .job::before{
    content:"";position:absolute;left:-34px;top:30px;width:14px;height:14px;border-radius:50%;
    background:var(--surface);border:3px solid var(--molten);box-shadow:0 0 0 4px rgba(232,116,59,.12);
  }
  .job-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:28px 32px;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease);
  }
  .job-card:hover{transform:translateX(4px);box-shadow:var(--shadow-lg)}
  .job-logo-chip{
    display:inline-flex;align-items:center;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:9px 14px;margin-bottom:16px;
  }
  .job-logo-chip img{height:24px;max-width:120px;object-fit:contain;display:block}
  .job-head{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:baseline;margin-bottom:4px}
  .job-title{font-size:1.18rem;font-weight:600;font-family:var(--font-display)}
  .job-badge{
    font-family:var(--font-mono);font-size:.66rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
    background:linear-gradient(100deg,var(--molten),var(--accent));color:#fff;border-radius:99px;padding:4px 11px;
  }
  .job-meta{color:var(--muted);font-size:.88rem;margin-bottom:18px}
  .job-meta b{color:var(--ink);font-weight:600}
  .job ul{list-style:none;display:grid;gap:10px}
  .job li{position:relative;padding-left:24px;color:var(--muted);font-size:.96rem}
  .job li::before{content:"";position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--molten)}
  .job li strong{color:var(--ink);font-weight:600}
  .job-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
  .tag{
    font-family:var(--font-mono);font-size:.72rem;font-weight:400;color:var(--muted);
    border:1px solid var(--line);border-radius:7px;padding:4px 10px;background:var(--bg);
  }

  /* ---------- skills ---------- */
  .skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:18px}
  .skill-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:26px;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease);
  }
  .skill-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
  .skill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
  .skill-head b{font-size:1rem;font-family:var(--font-display);font-weight:600}
  .lvl{font-family:var(--font-mono);font-size:.66rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
  .meter{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:12px 0 18px}
  .meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--molten),var(--molten-2));border-radius:99px;transition:width 1.2s var(--ease)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chips span{
    font-size:.8rem;font-weight:500;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:5px 11px;color:var(--ink);transition:all .2s;
  }
  .skill-card:hover .chips span{border-color:var(--accent-soft)}

  /* ---------- education & languages ---------- */
  .edu-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:stretch}
  @media (max-width:860px){.edu-grid{grid-template-columns:1fr}}
  .edu-card,.langs-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:34px;box-shadow:var(--shadow);
  }
  .edu-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
  .edu-head img{height:40px;max-width:160px;object-fit:contain;margin-top:4px}
  .edu-school{font-family:var(--font-display);font-size:1.3rem;font-weight:600;margin-bottom:2px}
  .edu-deg{color:var(--accent);font-weight:600;font-size:.95rem;margin-bottom:6px}
  .edu-meta{font-family:var(--font-mono);color:var(--muted);font-size:.82rem;margin-bottom:18px}
  .edu-card .chips{margin-top:4px}
  .edu-courses{color:var(--muted);font-size:.92rem;margin-bottom:12px}
  .langs-card h3{font-family:var(--font-mono);font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
  .lang-row{margin-bottom:18px}
  .lang-row:last-child{margin-bottom:0}
  .lang-row .lr{display:flex;justify-content:space-between;font-size:.94rem;margin-bottom:7px}
  .lang-row .lr b{font-weight:600}
  .lang-row .lr small{color:var(--muted)}

  /* ---------- contact ---------- */
  .contact.section{padding-bottom:40px}
  .contact-card{
    background:var(--dark);border-radius:var(--radius-lg);padding:74px 48px;text-align:center;
    color:#fff;position:relative;overflow:hidden;isolation:isolate;
  }
  .contact-card::before{
    content:"";position:absolute;inset:0;z-index:-1;
    background:
      radial-gradient(420px 320px at 50% -10%,rgba(232,116,59,.4),transparent 70%),
      radial-gradient(380px 300px at 12% 120%,rgba(158,43,37,.42),transparent 70%);
  }
  .contact-card h2{color:#fdf8f2;margin-bottom:14px}
  .contact-card p{color:rgba(243,236,228,.72);max-width:520px;margin:0 auto 36px}
  .contact-links{display:flex;flex-wrap:wrap;justify-content:center;gap:14px}
  .contact-links .btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);color:#fff}
  .contact-links .btn-ghost:hover{background:rgba(255,255,255,.16)}
  .contact-meta{margin-top:32px;font-family:var(--font-mono);color:rgba(243,236,228,.5);font-size:.8rem}

/* reveal + stagger observer (re-attachable) */
let io;
function rewatch(){
  if(io) io.disconnect();
  io = new IntersectionObserver(es=>es.forEach(en=>{
    if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
  }),{threshold:.14});
  document.querySelectorAll('.reveal,.stagger').forEach(el=>io.observe(el));
}

/* count-up for hero numbers */
function countUp(){
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target = +el.dataset.count; let n=0;
    const step = Math.max(1,Math.round(target/24));
    const tick=()=>{ n=Math.min(target,n+step); el.textContent=n; if(n<target) requestAnimationFrame(tick); };
    tick();
  });
}

/* ---------- vision flow engine ---------- */
const reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;
let flowPlayed=false, pipeTimers=[];
(function setupChart(){
  const seriesD="M0 150 L60 145 L120 152 L180 138 L240 142 L300 128 L360 118 L420 96 L455 72 L500 54 L560 46 L640 36";
  const hotD="M455 72 L500 54 L560 46 L640 36";

  document.getElementById('seriesHot').setAttribute('d',hotD);
  const head=document.getElementById('chartHead'); head.setAttribute('cx',455); head.setAttribute('cy',72);
})();
const fchart=()=>document.querySelector('.flow-chart');
const fwrap=()=>document.querySelector('.flow-wrap');
function clearFlow(){
  pipeTimers.forEach(clearTimeout); pipeTimers=[];
  fchart().classList.remove('run','fire'); fwrap().classList.remove('mail');
  document.querySelectorAll('.pstep').forEach(p=>p.classList.remove('on'));
  document.getElementById('series').style.strokeDashoffset='';
  document.getElementById('seriesHot').style.strokeDashoffset='';
  void fchart().offsetWidth; // reflow to restart CSS animations
}
function applyFlowStatic(){
  fchart().classList.add('run','fire'); fwrap().classList.add('mail');
  document.getElementById('series').style.strokeDashoffset='0';
  document.getElementById('seriesHot').style.strokeDashoffset='0';
  document.querySelectorAll('.pstep').forEach(p=>p.classList.add('on'));
}
function runFlow(){
  flowPlayed=true;
  if(reduceMotion){ applyFlowStatic(); return; }
  clearFlow();
  fchart().classList.add('run');
  const steps=[...document.querySelectorAll('.pstep')];
  [200,1400,2600,3300,4000].forEach((d,i)=>pipeTimers.push(setTimeout(()=>steps[i]&&steps[i].classList.add('on'),d)));
  pipeTimers.push(setTimeout(()=>fchart().classList.add('fire'),2700));
  pipeTimers.push(setTimeout(()=>fwrap().classList.add('mail'),3400));
}
document.getElementById('flowReplay').addEventListener('click',runFlow);
new IntersectionObserver((es,o)=>es.forEach(en=>{
  if(en.isIntersecting){ runFlow(); o.disconnect(); }
}),{threshold:.35}).observe(document.getElementById('vision'));

/* ---------- digital-twin node network ---------- */
(function(){
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce) return;
  const c = document.getElementById('net'), ctx = c.getContext('2d');
  let w,h,dpr,nodes=[],mouse={x:-999,y:-999},raf;
  function size(){
    dpr = Math.min(devicePixelRatio||1,2);
    w = hero.offsetWidth; h = hero.offsetHeight;
    c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    const count = Math.min(64, Math.round(w*h/22000));
    nodes = Array.from({length:count},()=>({
      x:Math.random()*w, y:Math.random()*h,
      vx:(Math.random()-.5)*.32, vy:(Math.random()-.5)*.32,
      r:Math.random()*1.6+.8
    }));
  }
  function step(){
    ctx.clearRect(0,0,w,h);
    for(const n of nodes){
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0||n.x>w) n.vx*=-1;
      if(n.y<0||n.y>h) n.vy*=-1;
      // gentle pull toward cursor
      const dx=mouse.x-n.x, dy=mouse.y-n.y, d=Math.hypot(dx,dy);
      if(d<160){ n.x+=dx/d*.5; n.y+=dy/d*.5; }
    }
    // links
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dist=Math.hypot(a.x-b.x,a.y-b.y);
        if(dist<128){
          const o=(1-dist/128)*.5;
          ctx.strokeStyle=`rgba(232,150,90,${o*0.5})`;
          ctx.lineWidth=.7;
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    // nodes
    for(const n of nodes){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);
      ctx.fillStyle='rgba(245,180,120,.85)';ctx.fill();
    }
    raf=requestAnimationFrame(step);
  }
  hero.addEventListener('pointermove',e=>{const r=hero.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;});
  hero.addEventListener('pointerleave',()=>{mouse.x=-999;mouse.y=-999;});
  addEventListener('resize',()=>{cancelAnimationFrame(raf);size();step();});
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else { cancelAnimationFrame(raf); step(); } });
  size(); step();
})();
</script>
</body>
</html>

<head>
<meta charset="UTF-8">

<title>CHEN Zihao — Ingénieur Industrie 4.0</title>
<meta name="description" content="CHEN Zihao — Ingénieur Arts et Métiers chez Saint-Gobain TIP Isover : digitalisation du savoir-faire process, automatisation, data et formation des opérateurs. Candidat Ingénieur Industrie 4.0.">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --bg:#faf8f5;
    --surface:#ffffff;
    --ink:#1c1a17;
    --muted:#6b655d;
    --line:#e8e2d9;
    --accent:#9e2b25;
    --accent-soft:#f6e9e7;
    --accent-deep:#6f1d19;
    --gold:#b08d3e;
    --radius:18px;
    --shadow:0 2px 6px rgba(28,26,23,.05),0 18px 40px -18px rgba(28,26,23,.14);
    --font-display:"Fraunces","Noto Sans SC",serif;
    --font-body:"Inter","Noto Sans SC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#fff}

  /* ---------- nav ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    backdrop-filter:blur(14px);
    background:rgba(250,248,245,.82);
    border-bottom:1px solid transparent;
    transition:border-color .3s;
  }
  .nav.scrolled{border-bottom-color:var(--line)}
  .nav-inner{
    max-width:1080px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;gap:24px;
  }
  .brand{
    font-family:var(--font-display);font-weight:700;font-size:1.05rem;
    text-decoration:none;color:var(--ink);letter-spacing:.02em;white-space:nowrap;
  }
  .brand em{color:var(--accent);font-style:normal}
  .nav-links{display:flex;gap:4px;margin-left:auto}
  .nav-links a{
    text-decoration:none;color:var(--muted);font-size:.86rem;font-weight:500;
    padding:7px 12px;border-radius:99px;transition:color .2s,background .2s;
  }
  .nav-links a:hover{color:var(--ink);background:var(--accent-soft)}
  .lang{display:flex;gap:2px;border:1px solid var(--line);border-radius:99px;padding:3px;background:var(--surface)}
  .lang button{
    border:0;background:transparent;cursor:pointer;font-family:var(--font-body);
    font-size:.78rem;font-weight:600;color:var(--muted);
    padding:4px 11px;border-radius:99px;transition:all .2s;
  }
  .lang button.active{background:var(--ink);color:#fff}
  @media (max-width:720px){.nav-links{display:none}}

  /* ---------- layout ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  section{padding:84px 0}
  .kicker{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.76rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);margin-bottom:14px;
  }
  .kicker::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
  h2{font-family:var(--font-display);font-size:clamp(1.7rem,3.4vw,2.3rem);font-weight:700;margin-bottom:36px;letter-spacing:-.01em}

  /* ---------- hero ---------- */
  .hero{padding-top:170px;padding-bottom:90px;position:relative;overflow:hidden}
  .hero::before{
    content:"";position:absolute;top:-220px;right:-180px;width:560px;height:560px;border-radius:50%;
    background:radial-gradient(circle,var(--accent-soft) 0%,transparent 68%);pointer-events:none;
  }
  .hero-tag{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--line);border-radius:99px;
    padding:7px 16px;font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:26px;
    box-shadow:var(--shadow);
  }
  .hero-tag .dot{width:8px;height:8px;border-radius:50%;background:#3da35d;animation:pulse 2.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,163,93,.45)}55%{box-shadow:0 0 0 7px rgba(61,163,93,0)}}
  h1{
    font-family:var(--font-display);
    font-size:clamp(2.5rem,6.4vw,4.3rem);
    line-height:1.07;font-weight:700;letter-spacing:-.02em;max-width:840px;
  }
  h1 .accent{color:var(--accent)}
  .hero-sub{max-width:640px;margin-top:24px;font-size:1.07rem;color:var(--muted)}
  .hero-cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:38px}
  .btn{
    display:inline-flex;align-items:center;gap:9px;
    padding:13px 26px;border-radius:99px;text-decoration:none;
    font-size:.93rem;font-weight:600;transition:transform .2s,box-shadow .2s,background .2s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 24px -8px rgba(158,43,37,.5)}
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
  .hero-grid{display:flex;align-items:center;gap:56px}
  .hero-main{flex:1;min-width:0}
  .avatar{
    flex:0 0 auto;width:212px;height:212px;border-radius:50%;padding:6px;
    background:linear-gradient(135deg,var(--accent),var(--gold));
    box-shadow:0 20px 44px -16px rgba(158,43,37,.4);
  }
  .avatar .ph{
    width:100%;height:100%;border-radius:50%;overflow:hidden;
    background:var(--surface);display:grid;place-items:center;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
  .avatar .mono{font-family:var(--font-display);font-size:3.6rem;font-weight:700;color:var(--accent)}
  .avatar.loaded img{display:block}
  .avatar.loaded .mono{display:none}
  @media (max-width:840px){
    .hero-grid{flex-direction:column-reverse;align-items:flex-start;gap:30px}
    .avatar{width:136px;height:136px;padding:5px}
    .avatar .mono{font-size:2.3rem}
  }
  .hero-stats{display:flex;flex-wrap:wrap;gap:0;margin-top:64px;border-top:1px solid var(--line)}
  .stat{padding:24px 44px 0 0}
  .stat b{font-family:var(--font-display);font-size:1.9rem;font-weight:700;display:block;line-height:1.2}
  .stat b span{color:var(--accent)}
  .stat small{color:var(--muted);font-size:.84rem}

  /* ---------- about ---------- */
  .about-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:48px;align-items:start}
  .about-text p{color:var(--muted);font-size:1.02rem;margin-bottom:18px}
  .about-text p strong{color:var(--ink);font-weight:600}
  .pillars{display:grid;gap:14px}
  .pillar{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);
  }
  .pillar .ico{
    flex:0 0 40px;height:40px;border-radius:12px;background:var(--accent-soft);
    display:grid;place-items:center;font-size:1.15rem;
  }
  .pillar b{display:block;font-size:.95rem;margin-bottom:2px}
  .pillar small{color:var(--muted);font-size:.84rem;line-height:1.5;display:block}
  @media (max-width:840px){.about-grid{grid-template-columns:1fr}}

  /* ---------- experience ---------- */
  .timeline{position:relative;padding-left:34px}
  .timeline::before{
    content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;
    background:linear-gradient(var(--accent),var(--line));border-radius:2px;
  }
  .job{position:relative;margin-bottom:36px}
  .job::before{
    content:"";position:absolute;left:-33px;top:10px;width:12px;height:12px;border-radius:50%;
    background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--accent);
  }
  .job-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:28px 30px;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;
  }
  .job-card:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(28,26,23,.06),0 26px 50px -20px rgba(28,26,23,.2)}
  .job-logo-chip{
    display:inline-flex;align-items:center;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:8px 13px;margin-bottom:14px;
  }
  .job-logo-chip img{height:26px;max-width:120px;object-fit:contain;display:block}
  .job-head{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:baseline;margin-bottom:4px}
  .job-title{font-size:1.13rem;font-weight:700;font-family:var(--font-display)}
  .job-badge{
    font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    background:var(--accent-soft);color:var(--accent-deep);border-radius:99px;padding:3px 11px;
  }
  .job-meta{color:var(--muted);font-size:.88rem;margin-bottom:16px}
  .job-meta b{color:var(--ink);font-weight:600}
  .job ul{list-style:none;display:grid;gap:9px}
  .job li{position:relative;padding-left:22px;color:var(--muted);font-size:.95rem}
  .job li::before{content:"▸";position:absolute;left:2px;color:var(--accent);font-size:.85rem}
  .job li strong{color:var(--ink);font-weight:600}
  .job-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
  .tag{
    font-size:.76rem;font-weight:500;color:var(--muted);
    border:1px solid var(--line);border-radius:99px;padding:3px 11px;background:var(--bg);
  }

  /* ---------- skills ---------- */
  .skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
  .skill-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px;box-shadow:var(--shadow);transition:transform .25s;
  }
  .skill-card:hover{transform:translateY(-3px)}
  .skill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
  .skill-head b{font-size:.98rem}
  .lvl{font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gold)}
  .meter{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin:10px 0 16px}
  .meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:99px;transition:width 1.1s cubic-bezier(.2,.7,.3,1)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chips span{
    font-size:.79rem;font-weight:500;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:4px 10px;color:var(--ink);
  }

  /* ---------- education & languages ---------- */
  .edu-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:stretch}
  @media (max-width:840px){.edu-grid{grid-template-columns:1fr}}
  .edu-card,.langs-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px;box-shadow:var(--shadow);
  }
  .edu-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
  .edu-head img{height:38px;max-width:150px;object-fit:contain;margin-top:4px}
  .edu-school{font-family:var(--font-display);font-size:1.25rem;font-weight:700;margin-bottom:2px}
  .edu-deg{color:var(--accent);font-weight:600;font-size:.95rem;margin-bottom:6px}
  .edu-meta{color:var(--muted);font-size:.88rem;margin-bottom:16px}
  .edu-card .chips{margin-top:4px}
  .langs-card h3{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .lang-row{margin-bottom:16px}
  .lang-row:last-child{margin-bottom:0}
  .lang-row .lr{display:flex;justify-content:space-between;font-size:.92rem;margin-bottom:6px}
  .lang-row .lr b{font-weight:600}
  .lang-row .lr small{color:var(--muted)}

  /* ---------- contact ---------- */
  .contact-card{
    background:linear-gradient(135deg,#211d19,#3a2320);
    border-radius:26px;padding:64px 48px;text-align:center;color:#fff;
    position:relative;overflow:hidden;
  }
  .contact-card::before{
    content:"";position:absolute;top:-160px;left:50%;transform:translateX(-50%);
    width:520px;height:380px;border-radius:50%;
    background:radial-gradient(circle,rgba(176,141,62,.25),transparent 70%);
  }
  .contact-card h2{color:#fff;margin-bottom:12px}
  .contact-card p{color:rgba(255,255,255,.72);max-width:480px;margin:0 auto 34px;position:relative}
  .contact-links{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;position:relative}
  .contact-links .btn-primary{box-shadow:0 10px 28px -6px rgba(158,43,37,.6)}
  .contact-links .btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff;box-shadow:none}
  .contact-links .btn-ghost:hover{background:rgba(255,255,255,.15)}
  .contact-meta{margin-top:30px;color:rgba(255,255,255,.55);font-size:.85rem;position:relative}

  footer{padding:34px 0 44px;text-align:center;color:var(--muted);font-size:.84rem}

  /* ---------- reveal ---------- */
  .reveal{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;transition:none}
    html{scroll-behavior:auto}
  }
</style>
</head>

const esc = s => s; // content is trusted local data
function render(lang){
  const t = I18N[lang];
  document.documentElement.lang = lang==='zh'?'zh-CN':lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t[el.dataset.i18n] ?? ''; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML = t[el.dataset.i18nHtml] ?? ''; });

  document.getElementById('pillars').innerHTML = t.pillars.map(p=>`
    <div class="pillar"><div class="ico">${p.ico}</div><div><b>${p.t}</b><small>${p.d}</small></div></div>`).join('');

  const JOB_LOGOS=[
    {src:'assets/saint-gobain.png',alt:'Saint-Gobain'},
    {src:'assets/saint-gobain.png',alt:'Saint-Gobain'},
    {src:'assets/forvia.png',alt:'FORVIA'}
  ];
  document.getElementById('timeline').innerHTML = t.jobs.map((j,i)=>`
    <div class="job">
      <div class="job-card">
        <div class="job-logo-chip"><img src="${JOB_LOGOS[i].src}" alt="${JOB_LOGOS[i].alt}" onerror="this.parentNode.remove()"></div>
        <div class="job-head"><span class="job-title">${j.title}</span>${j.badge?`<span class="job-badge">${j.badge}</span>`:''}</div>
        <div class="job-meta"><b>${j.company}</b> · ${j.meta}</div>
        <ul>${j.points.map(p=>`<li>${p}</li>`).join('')}</ul>
        <div class="job-tags">${j.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
      </div>
    </div>`).join('');

  document.getElementById('skillsGrid').innerHTML = t.skills.map(s=>`
    <div class="skill-card">
      <div class="skill-head"><b>${s.name}</b><span class="lvl">${s.lvl==='adv'?t.lvl_adv:t.lvl_pro}</span></div>
      <div class="meter"><i data-w="${s.w}"></i></div>
      <div class="chips">${s.chips.map(c=>`<span>${c}</span>`).join('')}</div>
    </div>`).join('');

  document.getElementById('eduChips').innerHTML = t.edu_chips.map(c=>`<span>${c}</span>`).join('');

  document.getElementById('langRows').innerHTML = t.langs.map(l=>`
    <div class="lang-row">
      <div class="lr"><b>${l.n}</b><small>${l.l}</small></div>
      <div class="meter"><i data-w="${l.w}"></i></div>
    </div>`).join('');

  document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.title = lang==='fr' ? 'CHEN Zihao — Ingénieur Industrie 4.0'
                 : lang==='en' ? 'CHEN Zihao — Industry 4.0 Engineer'
                 : '陈子豪 CHEN Zihao — 工业 4.0 工程师';
  localStorage.setItem('zh-site-lang',lang);
  requestAnimationFrame(()=>requestAnimationFrame(animateMeters));
}

function animateMeters(){
  document.querySelectorAll('.meter i').forEach(m=>{ m.style.width = m.dataset.w + '%'; });
}

document.getElementById('langSwitch').addEventListener('click',e=>{
  const b = e.target.closest('button'); if(b) render(b.dataset.lang);
});

const saved = localStorage.getItem('zh-site-lang');
render(['fr','en','zh'].includes(saved)?saved:'fr');

/* reveal on scroll */
const io = new IntersectionObserver(es=>es.forEach(en=>{
  if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}
}),{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

/* nav border on scroll */
const nav = document.getElementById('nav');
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>10),{passive:true});
</script>
